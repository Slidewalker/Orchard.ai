version: '3.8'

services:
  # Orchard.ai Dashboard (Nginx + Static)
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/nginx.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - app
    networks:
      - orchard-net

  # Orchard.ai Backend (Laravel)
  app:
    build:
      context: ./backend/laravel
      dockerfile: ../../infrastructure/docker/laravel.Dockerfile
    volumes:
      - ./backend/laravel:/var/www
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:XG8PqI8R8v/7V1z9N0k8lS/F1T2u3v4w5x6y7z8a9b0=
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=orchard_ai
      - DB_USERNAME=orchard_user
      - DB_PASSWORD=orchard_pass
    command: php artisan serve --host=0.0.0.0 --port=8000
    networks:
      - orchard-net
    depends_on:
      - db

  # Orchard.ai Database (MySQL Sharded Base)
  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=orchard_ai
      - MYSQL_USER=orchard_user
      - MYSQL_PASSWORD=orchard_pass
      - MYSQL_ROOT_PASSWORD=orchard_root_pass
    ports:
      - "3306:3306"
    networks:
      - orchard-net

networks:
  orchard-net:
    driver: bridge
