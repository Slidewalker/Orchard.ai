version: '3.8'

services:
  # Sovereign local AI provider (Ollama)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - orchard-net

  # Orchard.ai Dashboard (Nginx + Static)
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/nginx.Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./orchard-dashboard.html:/usr/share/nginx/html/index.html
      - ./Plan.html:/usr/share/nginx/html/Plan.html
      - ./Do.html:/usr/share/nginx/html/Do.html
      - ./Check.html:/usr/share/nginx/html/Check.html
      - ./Act.html:/usr/share/nginx/html/Act.html
      - ./moneytree.html:/usr/share/nginx/html/moneytree.html
      - ./assets:/usr/share/nginx/html/assets
    depends_on:
      - app
    networks:
      - orchard-net

  # Orchard.ai Backend (Laravel)
  app:
    build:
      context: ./backend/laravel
      dockerfile: ../../infrastructure/docker/laravel.Dockerfile
    volumes:
      - ./backend/laravel:/var/www
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:XG8PqI8R8v/7V1z9N0k8lS/F1T2u3v4w5x6y7z8a9b0=
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=orchard_ai
      - DB_USERNAME=orchard_user
      - DB_PASSWORD=orchard_pass
      - AI_PROVIDER=${AI_PROVIDER:-local}
      - LOCAL_AI_BASE_URL=${LOCAL_AI_BASE_URL:-http://ollama:11434}
      - LOCAL_AI_MODEL=${LOCAL_AI_MODEL:-llama3.2:1b}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-haiku-latest}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${AWS_REGION:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-anthropic.claude-3-haiku-20240307-v1:0}
    command: php artisan serve --host=0.0.0.0 --port=8000
    networks:
      - orchard-net
    depends_on:
      - db

  # Orchard.ai Database (MySQL Sharded Base)
  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=orchard_ai
      - MYSQL_USER=orchard_user
      - MYSQL_PASSWORD=orchard_pass
      - MYSQL_ROOT_PASSWORD=orchard_root_pass
    ports:
      - "3306:3306"
    networks:
      - orchard-net

  # Orchard.ai Message Queue (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - orchard-net

  # Orchard.ai AI Worker (Python consumer)
  ai-worker:
    build:
      context: .
      dockerfile: infrastructure/docker/python-worker.Dockerfile
    volumes:
      - ./backend/workers:/app
    environment:
      - DB_HOST=db
      - DB_USER=orchard_user
      - DB_PASSWORD=orchard_pass
      - DB_DATABASE=orchard_ai
      - AI_PROVIDER=${AI_PROVIDER:-local}
      - LOCAL_AI_BASE_URL=${LOCAL_AI_BASE_URL:-http://ollama:11434}
      - LOCAL_AI_MODEL=${LOCAL_AI_MODEL:-llama3.2:1b}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-haiku-latest}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${AWS_REGION:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-anthropic.claude-3-haiku-20240307-v1:0}
    depends_on:
      - rabbitmq
    networks:
      - orchard-net

  # Orchard.ai Compliance Cleaner (ISO 9001 6.1 Mitigation)
  compliance-cleaner:
    build:
      context: .
      dockerfile: infrastructure/docker/python-worker.Dockerfile
    volumes:
      - ./backend/workers:/app
      - ./backend/laravel:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=orchard_user
      - DB_PASSWORD=orchard_pass
      - DB_DATABASE=orchard_ai
    command: python -u /app/chaff_cleaner.py
    depends_on:
      - db
    networks:
      - orchard-net

networks:
  orchard-net:
    driver: bridge

volumes:
  ollama-data:
