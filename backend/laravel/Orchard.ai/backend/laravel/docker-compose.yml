version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: orchardai-laravel-app
    container_name: orchard_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
      - redis

  web:
    image: nginx:stable-alpine
    container_name: orchard_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:cached
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: orchard_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: orchard
      MYSQL_USER: orchard
      MYSQL_PASSWORD: orchard
    volumes:
      - dbdata:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: orchard_redis
    restart: unless-stopped

volumes:
  dbdata:
