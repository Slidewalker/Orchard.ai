apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: orchard
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: laravel
        image: orchard/backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        livenessProbe:
            httpGet:
                path: /api/winnowing/stream
                port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
        readinessProbe:
            httpGet:
                path: /api/winnowing/stream
                port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
        resources:
            limits:
                cpu: "500m"
                memory: "512Mi"
            requests:
                cpu: "250m"
                memory: "256Mi"
